<!-- index.html -->
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="shortcut icon" href="icon_images/favicon.png" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
  <title>Fiverr Safe Message For BDT</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const FiverrSafeTool = () => {
      const [darkMode, setDarkMode] = useState(false);
      const [inputText, setInputText] = useState('');
      const [outputHTML, setOutputHTML] = useState('');
      const [copyHTML, setCopyHTML] = useState('');
      const [outputText, setOutputText] = useState('');
      const [foundWords, setFoundWords] = useState(new Set());
      const [highlight, setHighlight] = useState(true);
      const [inputCount, setInputCount] = useState({ words: 0, chars: 0 });
      const [outputCount, setOutputCount] = useState({ words: 0, chars: 0 });
      const [copyFeedback, setCopyFeedback] = useState('');
      const [showToast, setShowToast] = useState(false);

      useEffect(() => {
        if (darkMode) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      }, [darkMode]);

      const riskyWords = [
        'mail', 'email', 'emails', 'e-mail', 'gmail', 'gmails', 'hotmail', 'outlook', 'yahoo', 'phone', 'number', 'contact', 'call', 'contact us','Umran',
        'whatsapp', 'telegram', 'skype', 'zoom', 'meet', 'hangouts', 'viber', 'imo', 'signal','Send money',
        'pay', 'payment', 'payments', 'purchase', 'purchasing', 'purchased', 'paypal', 'stripe', 'venmo', 'cashapp', 'bank', 'western union', 'moneygram', 'btc', 'bitcoin', 'crypto', 'wallet','price','payload',
        'wire transfer', 'invoice', 'direct payment', 'outside fiverr', 'outside fiver', 'off fiverr', 'off fiver', 'send money', 'money', 'buy', 'pricing', 'salary',
        'personal website', 'domain', 'upwork', 'outside', 'feedback', 'rating', 'freelancer', 'freelancer.com', 'peopleperhour', 'toptal', 'fiverr alternative',
        'facebook', 'messenger', 'instagram', 'linkedin', 'twitter', 'x.com', 'snapchat', 'tiktok', 'youtube', 'pinterest', 'reddit', 'discord',
        'give me your number', 'contact me outside', 'message me on', 'hire me on', 'work outside fiverr', 'pay directly',
        'gambling', 'casino', 'betting', 'sports betting', 'poker', 'slot games', 'slots', 'blackjack', 'roulette',
        'fuck', 'shit', 'bitch', 'bastard', 'asshole', 'dick', 'pussy', 'slut', 'whore', 'cunt', 'nude', 'nudes', 'porn', 'sex', 'hentai', 'adult content',
        'kill', 'die', 'suicide', 'bomb', 'terrorist', 'attack', 'shoot', 'gun', 'weapon', 'review','reviewed', 'reviews', 'contacts', 'payroll', 'slack', 'address', 'rizwan', 'ratings','star'
      ];

      const customHyphenPositions = {
        'payment': [2],
        'payments': [2],
        'payroll': [2],
        'payslip': [2]
      };

      const insertHyphen = (word) => {
        const clean = word.replace(/[^a-zA-Z]/g, '').toLowerCase();
        if (clean.length < 2) return word;

        let pos;
        if (customHyphenPositions[clean]) {
          const positions = customHyphenPositions[clean];
          pos = positions[Math.floor(Math.random() * positions.length)];
        } else {
          pos = Math.floor(clean.length / 2);
        }

        const hyphenated = clean.slice(0, pos) + '-' + clean.slice(pos);
        return word.replace(new RegExp(clean, 'i'), hyphenated);
      };

      const processMessage = () => {
        if (!inputText.trim()) {
          alert('⚠️ Please enter a message!');
          return;
        }

        let text = inputText;
        let htmlText = inputText;
        const found = new Set();

        riskyWords.forEach(risky => {
          const pattern = new RegExp(`\\b${risky}\\b`, 'gi');

          text = text.replace(pattern, match => {
            found.add(match.toLowerCase());
            return insertHyphen(match);
          });

          htmlText = htmlText.replace(pattern, match => {
            found.add(match.toLowerCase());
            const cleaned = insertHyphen(match);
            return highlight
              ? `<span style="background-color: #ffcccc; color: #a00; padding: 2px 4px; border-radius: 3px;">${cleaned}</span>`
              : cleaned;
          });
        });

        const applyLabels = (str) => {
          let res = str;
          res = res.replace(/buyer\s*:/gi, '<b style="color: red;">Buyer:</b>');
          res = res.replace(/seller\s*:/gi, '<b style="color: blue;">Seller:</b>');
          res = res.replace(/requirements\s*:/gi, '<b style="color: #FF00FF;">Requirements:</b>');
          res = res.replace(/custom\s*offer\s*:/gi, '<b style="color: #FF00FF;">Custom Offer:</b>');
          return res;
        };

        // Generate final HTML for display (with highlights)
        let finalDisplayHTML = applyLabels(htmlText);
        finalDisplayHTML = finalDisplayHTML.replace(/\n/g, '<br />');
        // Removed hardcoded color to allow Tailwind classes on the container to handle it dynamically
        finalDisplayHTML = `<div style="font-family: 'Lexend', sans-serif; font-size: 12pt;">${finalDisplayHTML}</div>`;

        // Generate final HTML for copying (without highlights on restricted words)
        let finalCopyHTML = applyLabels(text);
        finalCopyHTML = finalCopyHTML.replace(/\n/g, '<br />');
        finalCopyHTML = `<div style="color: black; font-family: 'Lexend', sans-serif; font-size: 12pt;">${finalCopyHTML}</div>`;

        setFoundWords(found);
        setOutputText(text);
        setOutputHTML(finalDisplayHTML);
        setCopyHTML(finalCopyHTML);
        updateCounts(inputText, text);

        // Clear input and show toast
        setInputText('');
        setInputCount({ words: 0, chars: 0 });
        setShowToast(true);
        setTimeout(() => setShowToast(false), 3000);
      };

      const updateCounts = (input, output) => {
        const inputWords = input.trim().split(/\s+/).filter(Boolean).length;
        const outputWords = output.trim().split(/\s+/).filter(Boolean).length;
        setInputCount({ words: inputWords, chars: input.length });
        setOutputCount({ words: outputWords, chars: output.length });
      };

      const handleInputChange = (e) => {
        const text = e.target.value;
        setInputText(text);
        updateCounts(text, outputText);
      };

      const copyOutput = () => {
        if (!outputText.trim()) {
          alert('⚠️ No safe message to copy!');
          return;
        }

        try {
          // The most reliable way to copy rich text (HTML + Plain Text)
          const onCopy = (e) => {
            e.clipboardData.setData('text/html', copyHTML);
            e.clipboardData.setData('text/plain', outputText);
            e.preventDefault();
          };

          document.addEventListener('copy', onCopy);
          const successful = document.execCommand('copy');
          document.removeEventListener('copy', onCopy);

          if (successful) {
            setCopyFeedback('✅ Copied!');
            setTimeout(() => setCopyFeedback(''), 2000);
          } else {
            throw new Error('execCommand failed');
          }
        } catch (err) {
          console.error('Rich copy failed, falling back to plain text:', err);
          // Fallback to basic plain text copy
          const textArea = document.createElement("textarea");
          textArea.value = outputText;
          document.body.appendChild(textArea);
          textArea.select();
          try {
            document.execCommand('copy');
            setCopyFeedback('✅ Copied!');
            setTimeout(() => setCopyFeedback(''), 2000);
          } catch (err2) {
            alert('❌ Copy failed!');
          }
          document.body.removeChild(textArea);
        }
      };

      const pasteToInput = () => {
        if (!outputText.trim()) {
          alert('⚠️ No safe message to paste!');
          return;
        }
        setInputText(outputText);
        updateCounts(outputText, outputText);
      };

      // Custom Icon Components using uploaded images
      const CustomIcon = ({ src, alt, className = "w-6 h-6" }) => (
        <img src={`icon_images/${src}`} alt={alt} className={className} />
      );

      return (
        <div className="min-h-screen bg-sky-100 dark:bg-slate-900 p-6 transition-colors duration-300">
          <div className="max-w-7xl mx-auto relative">
            {/* Theme Toggle Button */}
            <div className="absolute top-0 right-0 z-10">
              <button
                onClick={() => setDarkMode(!darkMode)}
                className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-2 rounded-full shadow-lg hover:scale-110 transition-all duration-200"
                title={darkMode ? "Switch to Light Mode" : "Switch to Dark Mode"}
              >
                {darkMode ? "💡" : "🌃"}
              </button>
            </div>

            {showToast && (
              <div className="fixed top-4 right-4 bg-green-600 text-white px-6 py-3 rounded-lg shadow-2xl flex items-center gap-2 z-50 animate-in fade-in slide-in-from-top-4 duration-300">
                <CustomIcon src="favicon.png" alt="Success" className="w-6 h-6" />
                <span className="font-bold">Message processed and input cleared!</span>
              </div>
            )}
            <div className="text-center mb-6">
              <div className="flex items-center justify-center gap-3 mb-2">
                <CustomIcon src="favicon.png" alt="Logo" className="w-10 h-10" />
                <h1 className="text-4xl font-bold text-slate-800 dark:text-white">Fiverr Safe Message For BDT</h1>
              </div>
              <p className="text-slate-600 dark:text-slate-400 text-lg">Protect your Fiverr messages from policy violations</p>
            </div>

            <div className="bg-sky-50 dark:bg-slate-800 border border-sky-300 dark:border-slate-700 rounded-lg p-3 mb-6 flex gap-3 max-w-2xl mx-auto shadow-sm">
              <div className="text-sky-600 dark:text-sky-400">
                <CustomIcon src="alert.png" alt="Alert" className="w-5 h-5 flex-shrink-0 mt-0.5" />
              </div>
              <p className="text-sky-800 dark:text-slate-300 text-sm font-medium">
                Always manually review the final message. This tool works carefully but cannot guarantee 100% accuracy.
              </p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-start">
              {/* Left Side: Input */}
              <div className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl overflow-hidden shadow-xl">
                <div className="p-5">
                  <div className="flex items-center justify-between mb-3">
                    <label className="text-slate-700 dark:text-slate-300 font-semibold flex items-center gap-2">
                      <CustomIcon src="message.png" alt="Message" className="w-5 h-5" />
                      Your Message:
                    </label>
                    <label className="flex items-center gap-2 cursor-pointer">
                      <input
                        type="checkbox"
                        checked={highlight}
                        onChange={(e) => setHighlight(e.target.checked)}
                        className="w-4 h-4 rounded accent-blue-600"
                      />
                      <span className="text-slate-500 dark:text-slate-400 text-sm flex items-center gap-1">
                        <CustomIcon src="highlight.png" alt="Highlight" className="w-4 h-4" />
                        Highlight words
                      </span>
                    </label>
                  </div>
                  
                  <textarea
                    value={inputText}
                    onChange={handleInputChange}
                    placeholder="Write your Fiverr message here..."
                    className="w-full h-[400px] bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg p-4 text-black dark:text-white placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 resize-none mb-2 transition-all"
                  />
                  <div className="flex justify-between items-center text-slate-500 dark:text-slate-400 text-sm mb-3">
                    <span>Words: {inputCount.words}</span>
                    <span>Characters: {inputCount.chars}</span>
                  </div>

                  <button
                    onClick={processMessage}
                    className="w-full bg-sky-500 hover:bg-sky-600 text-white font-bold py-3 px-6 rounded-lg transition-all duration-200 transform hover:scale-[1.01] active:scale-[0.99] flex items-center justify-center gap-2 shadow-lg"
                  >
                    <CustomIcon src="make-safe.png" alt="Safe" className="w-5 h-5" />
                    Make Safe
                  </button>
                </div>
              </div>

              {/* Right Side: Output */}
              <div className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl overflow-hidden shadow-xl">
                <div className="p-5">
                  <label className="block text-slate-700 dark:text-slate-300 font-semibold mb-3 flex items-center gap-2">
                    <CustomIcon src="favicon.png" alt="Safe" className="w-5 h-5" />
                    Safe Message:
                  </label>
                  <div
                    className="w-full h-[400px] bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg p-4 text-black dark:text-white overflow-y-auto whitespace-pre-wrap break-words mb-2"
                    dangerouslySetInnerHTML={{
                      __html: outputHTML || `<span class="text-slate-400 italic">${darkMode ? 'আপনার নিরাপদ বার্তা এখানে প্রদর্শিত হবে...' : 'Your safe message will appear here...'}</span>`
                    }}
                  />
                  <div className="flex justify-between items-center text-slate-500 dark:text-slate-400 text-sm mb-3">
                    <span>Words: {outputCount.words}</span>
                    <span>Characters: {outputCount.chars}</span>
                  </div>

                  <div className="flex gap-3">
                    <button
                      onClick={copyOutput}
                      className="flex-1 bg-green-600 hover:bg-green-700 text-white font-semibold py-3 px-4 rounded-lg transition-all duration-200 flex items-center justify-center gap-2 hover:shadow-lg active:scale-95"
                    >
                      <CustomIcon src="copy.png" alt="Copy" className="w-5 h-5" />
                      {copyFeedback || '📑 Copy Message'}
                    </button>
                    <button
                      onClick={pasteToInput}
                      className="flex-1 bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 px-4 rounded-lg transition-all duration-200 flex items-center justify-center gap-2 hover:shadow-lg active:scale-95"
                    >
                      <CustomIcon src="re-edit.png" alt="Edit" className="w-5 h-5" />
                      📥 Re-edit
                    </button>
                  </div>
                </div>

                {foundWords.size > 0 && (
                  <div className="p-3 bg-red-50 dark:bg-red-900/20 border-t border-red-200 dark:border-red-800 animate-in fade-in slide-in-from-bottom-2 duration-300">
                    <div className="flex gap-3">
                      <div className="text-red-600 dark:text-red-400 flex-shrink-0">
                        <CustomIcon src="alert.png" alt="Alert" className="w-5 h-5 flex-shrink-0 mt-0.5" />
                      </div>
                      <div>
                        <p className="text-red-800 dark:text-red-300 font-semibold text-sm">❌ Restricted Words Detected:</p>
                        <div className="flex flex-wrap gap-2 mt-2">
                          {Array.from(foundWords).map(word => (
                            <span key={word} className="bg-red-100 dark:bg-red-900/40 text-red-700 dark:text-red-300 text-xs px-2 py-1 rounded border border-red-200 dark:border-red-800">
                              {word}
                            </span>
                          ))}
                        </div>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </div>

            <footer className="text-center mt-8 text-slate-600 dark:text-slate-400 text-sm">
              © <a href="https://rafisportfolio.netlify.app" className="hover:text-blue-600 dark:hover:text-sky-400 transition-colors duration-300 ease-in-out font-medium" target="_blank" rel="noopener noreferrer">
                Rafi
              </a> || BDT Alpha
            </footer>
          </div>
        </div>
      );
    };

    ReactDOM.render(<FiverrSafeTool />, document.getElementById('root'));
  </script>
</body>

</html>
